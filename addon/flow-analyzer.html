<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Hello Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="module" defer src="flow-analyzer.js"></script>

    <style>
        /* Styling for the container */
        .container-custom {
            margin-top: 50px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        /* Styling for the dark mode button */
        .dark-mode-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="container container-custom">
        <h2>Flow Incoming Edge Analyzer</h2>
        <div class="mb-3">
            <!-- Dropdown list -->
            <label for="flowSelect" class="form-label">Available Flows</label>
            <select class="form-select" id="flowSelect">
            </select>
        </div>
        <button type="button" id="analyze" class="btn btn-primary position-relative">
            Analyze <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"
                style="display: none;"></span>
        </button>
        <div id="result-container"></div>
    </div>
    <!-- <button type="button" class="btn btn-secondary dark-mode-btn" id="darkModeToggle">Dark</button> -->
</body>

</html>
